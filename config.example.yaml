mqtt:
  broker: localhost
  port: 1883
  # username: ""
  # password: ""

rs485:
  port: /dev/ttyUSB0
  baud: 9600

grid:
  max_amps_per_phase: 20
  margin_amps: 3

power_source:
  # Supported types: rpict4v3, dsmr
  type: rpict4v3
  topics:
    power_phase1: "RPICT4V3/RP1"
    power_phase2: "RPICT4V3/RP2"
    power_phase3: "RPICT4V3/RP3"
    voltage_phase1: "RPICT4V3/Vrms1"
    voltage_phase2: "RPICT4V3/Vrms2"
    voltage_phase3: "RPICT4V3/Vrms3"

# kWh baseline calibration per TWC
# The TWC's internal counter may be inaccurate. Set the known real kWh
# and the TWC counter value at that moment. chargectl calculates:
#   displayed_kwh = real_kwh + (current_counter - counter_at_calibration)
# chargers:
#   "2919":
#     kwh_real: 67522
#     kwh_counter: 4793511
#   "6807":
#     kwh_real: 5149
#     kwh_counter: 2437

logging:
  level: info
